<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <link href="style.css" rel="stylesheet">
    </head>
    <body>
        <header class="header">
            <div class="hamburger" >
                <span></span>
                <span></span>
                <span></span>
            </div>

            <div><a href="index.html" class="logo">Active lawyer</a></div>
                <nav class="header-nav">
                    <a href="index.html">Home</a>
                    <a href="practice-areas.html">Practice Areas</a>
                    <a href="about.html">About</a>
                    <a href="faqs.html" class="active">FAQs</a>
                    <a href="contact.html">Contact</a>
                    <a href="admin.html">Admin</a>
                </nav>
        </header>

        <main>
            <section class="hero">
                <h1>
                    Trusted Legal Counsel In Ghana
                </h1>

                <p>
                Advocate & Solicitor, Supreme Court of Ghana 🏛️
                Pragmatic legal solutions <span>for individuals & businesses, guided by the 1992 Constitution of Ghana.</span>
                </p>

                <div class="hero-btns">
                    <button class="cta-btn">Book a Consultation</button>
                    <button class="cta-btn">Explore Practice Areas</button>
                </div>
            </section>
        </main>


        <script>
            // Hamburger and nav selectors
            const hamburger = document.querySelector('.hamburger');
            const navMenu = document.querySelector('.header-nav');

            // Toggle nav visibility on click
            hamburger.addEventListener('click', () => {
                navMenu.classList.toggle('active');
            });

            // close menu when a link is clicked
            document.querySelectorAll('.header-nav a').forEach(link => {
                link.addEventListener('click', () => {
                    navMenu.classList.remove('active');
                });
            });
      </script>

        
    </body>
</html>
